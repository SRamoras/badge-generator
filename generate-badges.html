<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate Badge</title>

    <link rel="stylesheet" href="styles.css" />

    <!-- fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
  </head>

  <body>

    <nav>
      <a class="logo" href="/">
        <div class="logo-mark">
          <svg viewBox="0 0 11 11" fill="none">
            <rect x="1" y="1" width="4" height="4" rx="1" fill="white"/>
            <rect x="6" y="1" width="4" height="4" rx="1" fill="white" opacity="0.5"/>
            <rect x="1" y="6" width="4" height="4" rx="1" fill="white" opacity="0.5"/>
            <rect x="6" y="6" width="4" height="4" rx="1" fill="white" opacity="0.3"/>
          </svg>
        </div>
        Badge.Gen
      </a>

      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">All badges</a></li>
      </ul>

      <button class="btn-cta" onclick="window.location.href='generate-badges.html'">
        Generate badges →
      </button>
    </nav>

    <div class="page">
      <h1>Adicionar Section a badge</h1>

      <form id="create-badge">
        <div class="input-group">
          <label>Name</label>
          <input id="name" class="input" type="text" placeholder="Diogo" />
        </div>

        <div class="input-group">
          <label>Surname</label>
          <input id="surname" class="input" type="text" placeholder="Silva" />
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input id="phone" class="input" type="text" placeholder="+351 932 231 533" />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input id="email" class="input" type="text" placeholder="diogo@gmail.com" />
        </div>

        <button type="submit" class="cssbuttons-io-button">
          Create Badge
        </button>
      </form>
    </div>

    <script src="generate-badges.js"></script>
  </body>
</html>
