<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Badge — Badge.Gen</title>
  <script type="module" src="/scripts/layout.js"></script>
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/badge.css" />
</head>

<body>
  <badge-header logo-href="/" cta-href="/pages/generate-badges.html"></badge-header>

  <div class="page">
    <div class="title">Your badge profile</div>

    <div id="badge-container">
      <p class="state-msg">Loading…</p>
    </div>

    <div class="actions" id="actions" style="display:none">
      <button id="downloadBtn" class="primary">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.5 1.5V9M6.5 9L3.5 6M6.5 9L9.5 6" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1.5 10.5H11.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Download
      </button>
      <button id="shareBtn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="2.5" r="1.5" stroke="#555" stroke-width="1.3"/>
          <circle cx="10" cy="10.5" r="1.5" stroke="#555" stroke-width="1.3"/>
          <circle cx="3" cy="6.5" r="1.5" stroke="#555" stroke-width="1.3"/>
          <path d="M4.4 5.7L8.6 3.3M4.4 7.3L8.6 9.7" stroke="#555" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Share
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="copy-toast" id="copyToast">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="#10b981" stroke-width="1.2"/><path d="M3.5 6l1.8 1.8 3.2-3.2" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Link copied to clipboard
  </div>

  <badge-footer></badge-footer>

  <script src="/scripts/webComponents/badge.js"></script>
  <script src="/scripts/badgePage.js"></script>
</body>
</html>
