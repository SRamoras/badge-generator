<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate Badge</title>

    <link rel="stylesheet" href="generateBadges.css" />


  </head>
<script src="../scripts/webComponents.js"></script>
  <body>

    <badge-gen-navbar
        logo-href="/"
        cta-href="/generate-badges.html"
      ></badge-gen-navbar>

    <div class="page">
      <h1>Adicionar Section a badge</h1>

      <form id="create-badge">
        <div class="input-group">
          <label>Name</label>
          <input id="name" class="input" type="text" placeholder="Diogo" />
        </div>

        <div class="input-group">
          <label>Surname</label>
          <input id="surname" class="input" type="text" placeholder="Silva" />
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input id="phone" class="input" type="text" placeholder="+351 932 231 533" />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input id="email" class="input" type="text" placeholder="diogo@gmail.com" />
        </div>

        <button type="submit" class="cssbuttons-io-button">
          Create Badge
        </button>
      </form>
    </div>

    <script src="../scripts/generateBadges.js"></script>
  </body>
</html>
